name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env && php artisan key:generate

      - name: Run Pint formatting check
        id: pint
        run: vendor/bin/pint --test
        continue-on-error: true

      - name: Run tests with coverage
        id: tests
        run: php artisan test --compact --coverage-clover=coverage.xml
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: steps.tests.outcome == 'success'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Generate API documentation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -L -o phpDocumentor.phar https://github.com/phpDocumentor/phpDocumentor/releases/download/v3.7.1/phpDocumentor.phar
          php phpDocumentor.phar -c phpdoc.dist.xml

      - name: Publish API docs to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api

      - name: Summarise results
        if: always()
        run: |
          echo ""
          echo "=== CI Results ==="
          echo "Formatting (Pint):  ${{ steps.pint.outcome }}"
          echo "Tests:              ${{ steps.tests.outcome }}"
          echo "=================="
          if [ "${{ steps.pint.outcome }}" != "success" ] || [ "${{ steps.tests.outcome }}" != "success" ]; then
            exit 1
          fi

      - name: Request changes on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const failures = [];
            if ('${{ steps.pint.outcome }}' !== 'success') {
              failures.push('**Formatting:** Run `vendor/bin/pint` locally and commit the result.');
            }
            if ('${{ steps.tests.outcome }}' !== 'success') {
              failures.push('**Tests:** Run `php artisan test --compact` locally and fix the failures.');
            }
            if (failures.length > 0) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'REQUEST_CHANGES',
                body: 'CI checks failed. Please address the following before merging:\n\n' + failures.join('\n'),
              });
            }
